# iOS Build-Check — kompiliert App + Widget OHNE Signing (keine Apple-Secrets noetig).
# Zweck: verifizieren, dass der Swift-Code (iOS 26 / Xcode 26) auf dem
# self-hosted Mac-mini-Runner baut.
name: iOS Build Check

on:
  push:
    branches: [main]
    paths:
      - "ios-app/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, ios, mac-mini-buero, familienplaner]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios-app
    steps:
      - uses: actions/checkout@v4

      - name: Versionen
        run: |
          set -euo pipefail
          xcodebuild -version
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-version || true
          xcrun simctl list runtimes

      - name: XcodeGen installieren
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Xcode-Projekt generieren
        run: xcodegen generate

      - name: App + Widget bauen (ohne Signing)
        run: |
          DERIVED_DATA="$RUNNER_TEMP/Familienplaner-BuildCheck-DerivedData"
          rm -rf "$DERIVED_DATA"
          xcodebuild build \
            -project Familienplaner.xcodeproj \
            -scheme Familienplaner \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Build-Artefakte aufraeumen
        if: always()
        run: |
          rm -rf "$RUNNER_TEMP/Familienplaner-BuildCheck-DerivedData"
          xcrun simctl delete unavailable || true
