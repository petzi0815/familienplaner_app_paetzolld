# iOS TestFlight — Familienplaner (native SwiftUI).
# Baut auf dem self-hosted Mac-mini-iOS-Runner und lädt den signierten Build
# nach TestFlight hoch. Voraussetzung: App-Record in App Store Connect
# (Bundle-ID app.yagemi.familienplaner) + Signing-Secrets/Variables.
name: iOS TestFlight

on:
  push:
    branches: [main]
    paths:
      - "ios-app/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 4 1 * *"   # 1. jeden Monats 04:00 UTC — hält den Build unter der 90-Tage-Verfallsfrist

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: [self-hosted, ios, mac-mini-buero, familienplaner]
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ios-app
    env:
      APP_BUNDLE_ID: app.yagemi.familienplaner
      # Nicht-geheime Variablen (Repo → Settings → Variables)
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APP_PROFILE_NAME: ${{ vars.APP_PROFILE_NAME }}
      WIDGET_PROFILE_NAME: ${{ vars.WIDGET_PROFILE_NAME }}
      # Secrets (Repo → Settings → Secrets)
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
      DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
      APP_PROFILE_BASE64: ${{ secrets.APP_PROFILE_BASE64 }}
      WIDGET_PROFILE_BASE64: ${{ secrets.WIDGET_PROFILE_BASE64 }}
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Xcode verifizieren
        run: |
          set -euo pipefail
          xcodebuild -version
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-version
          xcrun simctl list runtimes

      - name: XcodeGen installieren
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Xcode-Projekt generieren
        run: xcodegen generate

      - name: Signing-Secrets prüfen (fail-fast)
        run: |
          missing=""
          for v in APPLE_TEAM_ID APP_PROFILE_NAME WIDGET_PROFILE_NAME ASC_KEY_ID ASC_ISSUER_ID \
                   ASC_KEY_P8_BASE64 DIST_CERT_P12_BASE64 APP_PROFILE_BASE64 WIDGET_PROFILE_BASE64; do
            if [ -z "${!v}" ]; then missing="$missing $v"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Fehlende Secrets/Variablen:$missing — siehe docs/IOS.md"
            exit 1
          fi

      - name: Ruby und Bundler vorbereiten
        run: |
          set -euo pipefail
          if ! brew list ruby >/dev/null 2>&1; then
            brew install ruby
          fi
          ruby_prefix="$(brew --prefix ruby)"
          echo "$ruby_prefix/bin" >> "$GITHUB_PATH"
          "$ruby_prefix/bin/ruby" -v
          "$ruby_prefix/bin/gem" install bundler --no-document
          "$ruby_prefix/bin/bundle" config set path "$RUNNER_TEMP/bundle"
          "$ruby_prefix/bin/bundle" install --jobs 4 --retry 3

      - name: Build + Upload an TestFlight
        run: |
          set -euo pipefail
          export PATH="$(brew --prefix ruby)/bin:$PATH"
          export GYM_OUTPUT_DIRECTORY="$RUNNER_TEMP/fastlane-output"
          export GYM_BUILD_PATH="$RUNNER_TEMP/fastlane-archives"
          export GYM_DERIVED_DATA_PATH="$RUNNER_TEMP/Familienplaner-DerivedData"
          bundle exec fastlane ios beta

      - name: Build-Artefakte aufraeumen
        if: always()
        run: |
          rm -rf "$RUNNER_TEMP/fastlane-output" "$RUNNER_TEMP/fastlane-archives" "$RUNNER_TEMP/Familienplaner-DerivedData"
          xcrun simctl delete unavailable || true
