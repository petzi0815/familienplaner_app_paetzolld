# iOS TestFlight — Familienplaner (native SwiftUI).
# DEAKTIVIERT bis aktiviert: Datei nach `.github/workflows/ios.yml` verschieben und mit einem
# Git-Token MIT `workflow`-Scope pushen (`gh auth refresh -s workflow`). Details: docs/IOS.md.
# Voraussetzung: App-Record in App Store Connect existiert (Bundle-ID app.yagemi.familienplaner)
# + Signing-Secrets als Repo-Secrets/Variables (siehe docs/IOS.md).
name: iOS TestFlight

on:
  push:
    branches: [main]
    paths:
      - "ios-app/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 4 1 * *"   # 1. jeden Monats 04:00 UTC — hält den Build unter der 90-Tage-Verfallsfrist

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 40
    defaults:
      run:
        working-directory: ios-app
    env:
      APP_BUNDLE_ID: app.yagemi.familienplaner
      # Nicht-geheime Variablen (Repo → Settings → Variables)
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APP_PROFILE_NAME: ${{ vars.APP_PROFILE_NAME }}
      WIDGET_PROFILE_NAME: ${{ vars.WIDGET_PROFILE_NAME }}
      # Secrets (Repo → Settings → Secrets)
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
      DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
      APP_PROFILE_BASE64: ${{ secrets.APP_PROFILE_BASE64 }}
      WIDGET_PROFILE_BASE64: ${{ secrets.WIDGET_PROFILE_BASE64 }}
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Xcode auswählen
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"   # iOS-26-SDK (Liquid Glass, Foundation Models). Falls das macos-15-Image
                                  # kein Xcode 26 hat: runs-on auf macos-26 heben.

      - name: XcodeGen installieren
        run: brew install xcodegen

      - name: Xcode-Projekt generieren
        run: xcodegen generate

      - name: Signing-Secrets prüfen (fail-fast)
        run: |
          missing=""
          for v in APPLE_TEAM_ID APP_PROFILE_NAME WIDGET_PROFILE_NAME ASC_KEY_ID ASC_ISSUER_ID \
                   ASC_KEY_P8_BASE64 DIST_CERT_P12_BASE64 APP_PROFILE_BASE64 WIDGET_PROFILE_BASE64; do
            if [ -z "${!v}" ]; then missing="$missing $v"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Fehlende Secrets/Variablen:$missing — siehe docs/IOS.md"
            exit 1
          fi

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ios-app

      - name: Build + Upload an TestFlight
        run: bundle exec fastlane ios beta
