name: Familienplaner

# Die .xcodeproj wird NICHT committet, sondern auf dem CI-Runner per `xcodegen generate` erzeugt.
options:
  bundleIdPrefix: app.yagemi
  deploymentTarget:
    iOS: "26.0"                     # nur neueste iPhones — Liquid Glass, Foundation Models
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Distribution"
    DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"   # via fastlane xcargs (APPLE_TEAM_ID)

targets:
  Familienplaner:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: App/Resources
      - path: Shared          # SharedStore (App Group) — auch im Widget-Target
    dependencies:
      - target: FamilienplanerWidgets   # Extension einbetten
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yagemi.familienplaner
        TARGETED_DEVICE_FAMILY: "1"           # iPhone
        PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROFILE_NAME)"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: App/Familienplaner.entitlements
      properties:
        aps-environment: production   # TestFlight/App Store nutzt Production-APNs
        com.apple.security.application-groups:
          - group.app.yagemi.familienplaner
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Familienplaner
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "Zum Aufnehmen von Fotos und Scannen von Barcodes (Bücher-ISBN, Lebensmittel)."
        NSPhotoLibraryUsageDescription: "Zum Auswählen von Fotos aus der Mediathek."
        NSCalendarsWriteOnlyAccessUsageDescription: "Zum Eintragen von Terminen und Ereignissen in deinen iOS-Kalender."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: app.yagemi.familienplaner.newphoto
            UIApplicationShortcutItemTitle: Foto aufnehmen
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeCompose
          - UIApplicationShortcutItemType: app.yagemi.familienplaner.scanbook
            UIApplicationShortcutItemTitle: Buch scannen
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeBookmark
          - UIApplicationShortcutItemType: app.yagemi.familienplaner.today
            UIApplicationShortcutItemTitle: Was steht heute an
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeDate

  # ── UI-Test-Target (XCUITest) — nur für die `test`-Action, nicht im Build-Check/Archive ──
  FamilienplanerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: Familienplaner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yagemi.familienplaner.uitests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: ""
        TARGETED_DEVICE_FAMILY: "1"

  # ── Widget-Extension (Home-/Lock-Screen/StandBy) ──
  FamilienplanerWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Shared          # SharedStore (App Group) geteilt mit der App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yagemi.familienplaner.widgets
        TARGETED_DEVICE_FAMILY: "1"           # iPhone
        PROVISIONING_PROFILE_SPECIFIER: "$(WIDGET_PROFILE_NAME)"
    entitlements:
      path: Widgets/FamilienplanerWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.yagemi.familienplaner
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Familienplaner
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  Familienplaner:
    build:
      targets:
        Familienplaner: all
        FamilienplanerUITests: [test]
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - FamilienplanerUITests
    archive:
      config: Release
    run:
      config: Debug
