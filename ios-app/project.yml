name: Familienplaner

# Die .xcodeproj wird NICHT committet, sondern auf dem CI-Runner per `xcodegen generate` erzeugt.
options:
  bundleIdPrefix: app.yagemi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Distribution"
    DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"   # via fastlane xcargs (APPLE_TEAM_ID)

targets:
  Familienplaner:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: App/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yagemi.familienplaner
        TARGETED_DEVICE_FAMILY: "1"           # iPhone
        PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROFILE_NAME)"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: App/Familienplaner.entitlements
      properties:
        aps-environment: production   # TestFlight/App Store nutzt Production-APNs
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Familienplaner
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "Zum Aufnehmen von Fotos für den Familienplaner."
        NSPhotoLibraryUsageDescription: "Zum Auswählen von Fotos aus der Mediathek."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: app.yagemi.familienplaner.newphoto
            UIApplicationShortcutItemTitle: Foto aufnehmen
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeCompose

schemes:
  Familienplaner:
    build:
      targets:
        Familienplaner: all
    archive:
      config: Release
    run:
      config: Debug
